# ============================================================================
# esphome-usb-lamparray — fan-leds.yaml
#
# Windows Dynamic Lighting → USB HID LampArray → ESP32-S3-Zero → WS2812B fans
#
# Hardware:
#   Board : Waveshare ESP32-S3-Zero
#   LEDs  : WS2812B, data wire → GPIO2 (any free GPIO works; avoid 19/20 = USB)
#   USB   : The board's USB-C port connects directly to your PC
#
# First flash: hold BOOT button while plugging in USB, then flash via USB.
# OTA updates: work normally once initial firmware is running.
# ============================================================================

esphome:
  name: fan-leds
  friendly_name: "PC Fan LEDs"
  # Needed so TinyUSB USB OTG is used instead of the Serial/JTAG peripheral
  platformio_options:
    board_build.usb_mode: 1  # 1 = TinyUSB (OTG), 0 = Serial/JTAG

esp32:
  board: esp32-s3-devkitm-1   # closest match for Waveshare S3-Zero in ESPHome
  variant: esp32s3
  framework:
    type: esp-idf
    # TinyUSB HID support requires esp-idf framework (not Arduino)
    sdkconfig_options:
      CONFIG_TINYUSB_ENABLED: "y"
      CONFIG_TINYUSB_HID_ENABLED: "y"
      CONFIG_TINYUSB_DESC_MANUFACTURER_STRING: "ESPHome"
      CONFIG_TINYUSB_DESC_PRODUCT_STRING: "USB LampArray"
      CONFIG_TINYUSB_DESC_USE_ESPRESSIF_VID: "n"
      CONFIG_TINYUSB_DESC_CUSTOM_VID: "0x303A"
      CONFIG_TINYUSB_DESC_CUSTOM_PID: "0x4004"
      # Disable USB Serial/JTAG so OTG has full control
      CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG: "n"
      CONFIG_ESP_CONSOLE_UART_DEFAULT: "y"

logger:
  # Use hardware UART for logs (GPIO43=TX, GPIO44=RX on S3-Zero)
  # This frees up USB for HID — connect a USB-UART adapter if you need logs
  hardware_uart: UART0
  baud_rate: 115200

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Fan-Leds Fallback"
    password: "fanledsfallback"

ota:
  platform: esphome
  password: !secret ota_password

api:
  password: !secret api_password

# ---- External component (point this at your local clone or GitHub fork) ----
external_components:
  - source:
      type: local
      path: components   # use this if you cloned the repo locally
      # OR use GitHub after you push:
      # type: git
      # url: https://github.com/YOUR_USERNAME/esphome-usb-lamparray
      # ref: main
    components: [usb_lamparray]

# ---- Your LED strip ----
light:
  - platform: neopixelbus
    id: fan_leds
    name: "PC Fan LEDs"
    type: GRB           # WS2812B is GRB — double-check your specific strip
    variant: WS2812X
    pin: GPIO2          # Change to whichever GPIO you use for the data wire
    num_leds: 16        # Total LEDs across all fans (3 fans × ~5 LEDs = 15 etc.)
    # Disable ESPHome's own power-on effect so the LampArray component controls colour
    effects: []
    restore_mode: ALWAYS_OFF

# ---- USB HID LampArray ----
usb_lamparray:
  num_lamps: 16               # Must match light.num_leds above
  lamp_array_kind: peripheral # Options: keyboard, mouse, peripheral, chassis, etc.
  light_id: fan_leds
  manufacturer: "ESPHome"
  product: "PC Fan LampArray"
  # Colour shown when no Windows app is actively controlling the device
  # [R, G, B] — this faint blue is a nice "idle" colour
  autonomous_mode_color: [0, 0, 20]
  # Optional: change USB VID/PID if you have multiple devices
  # vendor_id: 0x303A
  # product_id: 0x4004
