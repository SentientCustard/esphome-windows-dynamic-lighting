# ============================================================================
# esphome-usb-lamparray — fan-leds.yaml
#
# Windows Dynamic Lighting → USB HID LampArray → ESP32-S3-Zero → WS2812B fans
#
# Hardware:
#   Board : Waveshare ESP32-S3-Zero
#   LEDs  : WS2812B, data wire → GPIO6 (any free GPIO; avoid 19/20 = USB D+/D-)
#   USB   : The board's USB-C port connects directly to your PC
#
# NOTE: No `tinyusb:` block. ESPHome's tinyusb component has no double-install
# guard and would wipe our HID descriptors. Include paths are injected directly
# via build_flags in __init__.py. TinyUSB stack is pulled in by sdkconfig_options.
# ============================================================================

esphome:
  name: "esphome-s3-40"
  friendly_name: ESPHome PC Fan LEDs
  name_add_mac_suffix: false
  platformio_options:
    board_build.usb_mode: 1       # 1 = TinyUSB OTG, 0 = Serial/JTAG

esp32:
  board: esp32-s3-devkitm-1
  variant: esp32s3
  framework:
    type: esp-idf
    sdkconfig_options:
      # TinyUSB is enabled via add_idf_component in usb_lamparray/__init__.py
      CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG: "n"
      CONFIG_ESP_CONSOLE_UART_DEFAULT: "y"

# ── Home Assistant integration ───────────────────────────────────────────────
time:
  - platform: homeassistant
    id: homeassistant_time

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# ── Lights ───────────────────────────────────────────────────────────────────
light:
  - platform: esp32_rmt_led_strip
    id: fan_leds
    name: "PC Fan LEDs"
    rgb_order: GRB
    pin: 6
    num_leds: 16
    chipset: WS2812
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 0.08s
    gamma_correct: 1
    rmt_symbols: 128
  - platform: esp32_rmt_led_strip
    id: onboardLED
    name: "Onboard LED"
    num_leds: 1
    rgb_order: GRB
    pin: 21
    chipset: WS2812
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 0.08s
    gamma_correct: 1
    rmt_symbols: 64

# ── External component ───────────────────────────────────────────────────────
external_components:
  - source:
      type: git
      url: https://github.com/SentientCustard/esphome-windows-dynamic-lighting/
    components: [usb_lamparray]

# ── USB HID LampArray ────────────────────────────────────────────────────────
usb_lamparray:
  manufacturer: "ESPHome"
  product: "PC Fan LampArray"
  lamp_array_kind: peripheral
  num_lamps: 16 #Any change to this number requires deleting and re-scanning the device in Device Manager, Windows only checks this on first connection
  light_id: fan_leds
#  num_lamps: 1 # for testing with the onboard LED
#  light_id: onboardLED # for testing with the onboard LED
